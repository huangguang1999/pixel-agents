name: Release

# Cut a release by pushing a tag like `v0.2.0`. The workflow builds macOS
# (universal), Windows (x86_64), and Linux (x86_64) bundles in parallel
# and attaches them to a GitHub Release. Contributors hack on main; users
# download installers from the Releases page.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# tauri-action creates a draft Release and uploads bundles to it — that
# requires write access to the repo's releases, which GITHUB_TOKEN does
# not have by default ("Resource not accessible by integration" otherwise).
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "x86_64-apple-darwin,aarch64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          # Windows is intentionally absent — ipc.rs uses UDS and reaper.rs
          # uses `kill -0`, so src-tauri/src/lib.rs has a `compile_error!`
          # guard for non-unix targets. Adding Windows back requires porting
          # those modules to named pipes + OpenProcess.
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Single Release per tag; the first matrix job creates it, the
          # rest append their artifacts. __VERSION__ is replaced by the
          # version from src-tauri/tauri.conf.json.
          tagName: ${{ github.ref_name }}
          releaseName: "Pixel Agents __VERSION__"
          releaseBody: |
            Download the build for your platform below.

            - **macOS** — `.dmg` (universal: Apple Silicon + Intel)
            - **Linux** — `.AppImage` or `.deb`

            > macOS Gatekeeper will warn on first launch because the app is
            > not notarized yet. Right-click → Open to bypass, or run
            > `xattr -cr /Applications/pixel-agents.app` in Terminal.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
